<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manager – Cooking Mama</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Pacifico&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#091A10;--bg2:#0D2218;--card:#122A1C;--card2:#183625;
      --border:#1E4D2E;--text:#D4F5E0;--text2:#6EAF88;
      --accent:#4FC97F;--accent2:#2D8A4E;--red:#FF5C6A;--red2:#C0392B;
      --yellow:#FFD54F;--blue:#7EC8E3;--purple:#C97FC7;
      --shadow:rgba(79,201,127,0.18);
    }
    html,body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    nav{position:sticky;top:0;z-index:100;background:var(--bg2);border-bottom:2px solid var(--border);
      display:flex;align-items:center;justify-content:space-between;padding:10px 24px;
      box-shadow:0 2px 20px var(--shadow)}
    .nav-logo{height:44px;object-fit:contain;cursor:pointer}
    .nav-title{font-family:'Pacifico',cursive;font-size:1.1rem;color:var(--accent)}
    .nav-right{display:flex;align-items:center;gap:12px}
    .user-pill{display:flex;align-items:center;gap:8px;background:var(--card);border:1.5px solid var(--border);
      border-radius:50px;padding:5px 14px 5px 5px;font-weight:700;font-size:0.82rem;color:var(--text2)}
    .user-pill img{width:30px;height:30px;border-radius:50%;border:2px solid var(--accent);object-fit:cover}
    .sign-out-btn{background:transparent;border:2px solid var(--border);border-radius:50px;padding:6px 14px;
      font-family:'Nunito',sans-serif;font-size:0.78rem;font-weight:700;color:var(--text2);cursor:pointer;
      transition:border-color .2s,color .2s}
    .sign-out-btn:hover{border-color:var(--red);color:var(--red)}
    .hero{text-align:center;padding:32px 16px 8px}
    .hero h1{font-family:'Pacifico',cursive;font-size:2rem;color:var(--accent);text-shadow:0 0 30px rgba(79,201,127,0.3)}
    .hero p{color:var(--text2);font-weight:600;margin-top:4px}
    .main-wrap{max-width:900px;margin:0 auto;padding:20px 16px 80px;display:flex;flex-direction:column;gap:28px}

    /* ADD ITEM FORM */
    .form-card{background:var(--card);border:2px solid var(--border);border-radius:20px;padding:22px 24px}
    .form-card h2{font-family:'Pacifico',cursive;font-size:1.1rem;color:var(--accent);margin-bottom:16px}
    .form-row{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:10px;align-items:end}
    .form-group{display:flex;flex-direction:column;gap:5px}
    .form-label{font-size:0.75rem;font-weight:900;color:var(--text2);text-transform:uppercase;letter-spacing:0.07em}
    .form-input{background:var(--card2);border:2px solid var(--border);border-radius:12px;
      padding:10px 14px;font-family:'Nunito',sans-serif;font-size:0.9rem;font-weight:700;
      color:var(--text);outline:none;transition:border-color .2s;width:100%}
    .form-input:focus{border-color:var(--accent)}
    .add-item-btn{background:var(--accent2);border:none;border-radius:12px;padding:11px 20px;
      font-family:'Nunito',sans-serif;font-size:0.88rem;font-weight:900;color:#fff;cursor:pointer;
      box-shadow:0 3px 0 #1a5c34;transition:transform .1s,box-shadow .1s;white-space:nowrap}
    .add-item-btn:hover{transform:translateY(-2px)}
    .add-item-btn:active{transform:translateY(2px);box-shadow:0 1px 0 #1a5c34}

    /* INVENTORY TABLE */
    .inv-card{background:var(--card);border:2px solid var(--border);border-radius:20px;overflow:hidden}
    .inv-header{padding:18px 24px;border-bottom:2px solid var(--border);
      display:flex;align-items:center;justify-content:space-between}
    .inv-header h2{font-family:'Pacifico',cursive;font-size:1.1rem;color:var(--accent)}
    .inv-count{background:var(--card2);border-radius:50px;padding:4px 12px;
      font-size:0.78rem;font-weight:800;color:var(--text2)}
    .inv-table{width:100%;border-collapse:collapse}
    .inv-table th{padding:11px 16px;text-align:left;font-size:0.72rem;font-weight:900;
      color:var(--text2);text-transform:uppercase;letter-spacing:0.07em;
      border-bottom:1.5px solid var(--border);background:var(--card2)}
    .inv-table td{padding:12px 16px;font-size:0.88rem;font-weight:700;
      border-bottom:1px solid var(--border);color:var(--text)}
    .inv-table tr:last-child td{border-bottom:none}
    .inv-table tr:hover td{background:rgba(79,201,127,0.04)}
    .low-stock{color:var(--yellow);font-weight:900}
    .low-badge{background:rgba(255,213,79,0.15);color:var(--yellow);border:1.5px solid var(--yellow);
      border-radius:50px;padding:2px 10px;font-size:0.7rem;font-weight:900;white-space:nowrap}
    .del-btn{background:transparent;border:1.5px solid var(--border);border-radius:8px;padding:4px 10px;
      font-size:0.75rem;font-weight:800;color:var(--text2);cursor:pointer;transition:all .15s}
    .del-btn:hover{border-color:var(--red);color:var(--red);background:rgba(255,92,106,0.08)}
    .empty-inv{text-align:center;color:var(--text2);padding:40px;font-weight:700}

    /* STATS ROW */
    .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
    .stat-card{background:var(--card);border:2px solid var(--border);border-radius:16px;
      padding:16px 20px;text-align:center}
    .stat-val{font-size:1.6rem;font-weight:900;color:var(--accent);font-family:'Pacifico',cursive}
    .stat-lbl{font-size:0.78rem;color:var(--text2);font-weight:700;margin-top:4px}

    /* LOADER / TOAST */
    #authLoader{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center}
    .spinner{width:46px;height:46px;border:5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(40px);
      background:#122A1C;color:var(--accent);padding:12px 26px;border-radius:50px;border:2px solid var(--accent);
      font-size:0.9rem;font-weight:800;z-index:500;opacity:0;transition:opacity .3s,transform .3s;
      pointer-events:none;white-space:nowrap}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    @media(max-width:700px){
      .form-row{grid-template-columns:1fr 1fr}
      .stats-row{grid-template-columns:1fr 1fr}
      .inv-table th:last-child,.inv-table td:last-child{display:none}
    }
    @media(max-width:480px){.form-row{grid-template-columns:1fr}.stats-row{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div id="authLoader"><div class="spinner"></div></div>

<nav id="mainNav" style="display:none">
  <img class="nav-logo" src="logonav.jpg" alt="Cooking Mama"/>
  <span class="nav-title">Manager Dashboard 📦</span>
  <div class="nav-right">
    <div class="user-pill">
      <img id="navAvatar" src="" alt="avatar"/>
      <span id="navName">Manager</span>
    </div>
    <button class="sign-out-btn" id="btnSignOut">Sign Out</button>
  </div>
</nav>

<div id="pageContent" style="display:none">
  <div class="hero">
    <h1>📦 Inventory Control</h1>
    <p>Manage stock, track costs, prevent shortages</p>
  </div>

  <div class="main-wrap">
    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-val" id="statTotal">0</div>
        <div class="stat-lbl">Total Items</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="statLow">0</div>
        <div class="stat-lbl">Low Stock ⚠️</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="statCost">$0</div>
        <div class="stat-lbl">Total Inv. Cost</div>
      </div>
    </div>

    <!-- Add form -->
    <div class="form-card">
      <h2>➕ Add Inventory Item</h2>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Item Name</label>
          <input class="form-input" id="iName" type="text" placeholder="e.g. Tomatoes"/>
        </div>
        <div class="form-group">
          <label class="form-label">Quantity</label>
          <input class="form-input" id="iQty" type="number" min="0" placeholder="50"/>
        </div>
        <div class="form-group">
          <label class="form-label">Cost ($)</label>
          <input class="form-input" id="iCost" type="number" min="0" step="0.01" placeholder="20.00"/>
        </div>
        <button class="add-item-btn" id="addItemBtn">Add Item</button>
      </div>
    </div>

    <!-- Inventory Table -->
    <div class="inv-card">
      <div class="inv-header">
        <h2>🗂️ Current Inventory</h2>
        <span class="inv-count" id="invCount">0 items</span>
      </div>
      <table class="inv-table">
        <thead>
          <tr>
            <th>Item</th>
            <th>Quantity</th>
            <th>Cost</th>
            <th>Status</th>
            <th>Remove</th>
          </tr>
        </thead>
        <tbody id="invBody">
          <tr><td colspan="5" class="empty-inv">No inventory items yet. Add one above!</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, signOut, onAuthStateChanged }
                            from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, serverTimestamp, query, orderBy }
                            from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey:"AIzaSyCEAcwTKoSnUkbaGvjrsy1QZ-Duj12WImk",
    authDomain:"cookingmamauwu-9902c.firebaseapp.com",
    projectId:"cookingmamauwu-9902c",
    storageBucket:"cookingmamauwu-9902c.firebasestorage.app",
    messagingSenderId:"18763902036",
    appId:"1:18763902036:web:a8703f75e5ddf1d1b791c1"
  };

  const OWNER_EMAIL   = "danielaiscool6128@gmail.com";
  const MANAGER_EMAIL = "mateusstavares2008@gmail.com";

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  const LOW_STOCK_THRESHOLD = 10;

  onAuthStateChanged(auth, user => {
    document.getElementById("authLoader").style.display = "none";
    if (!user) { window.location.href = "signup.html"; return; }
    if (user.email !== MANAGER_EMAIL && user.email !== OWNER_EMAIL) {
      window.location.href = "customer.html"; return;
    }
    document.getElementById("navAvatar").src = user.photoURL || "";
    document.getElementById("navName").textContent = user.displayName?.split(" ")[0] || "Manager";
    document.getElementById("mainNav").style.display = "flex";
    document.getElementById("pageContent").style.display = "block";
    listenInventory();
  });

  document.getElementById("btnSignOut").addEventListener("click", async () => {
    await signOut(auth); window.location.href = "signup.html";
  });

  let inventory = [];

  function listenInventory() {
    const q = query(collection(db, "inventory"), orderBy("createdAt", "asc"));
    onSnapshot(q, snap => {
      inventory = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderInventory();
    });
  }

  function renderInventory() {
    const body    = document.getElementById("invBody");
    const count   = document.getElementById("invCount");
    const statT   = document.getElementById("statTotal");
    const statL   = document.getElementById("statLow");
    const statC   = document.getElementById("statCost");

    const totalCost = inventory.reduce((s,i) => s + (parseFloat(i.cost)||0), 0);
    const lowCount  = inventory.filter(i => (parseInt(i.quantity)||0) <= LOW_STOCK_THRESHOLD).length;

    statT.textContent = inventory.length;
    statL.textContent = lowCount;
    statC.textContent = "$" + totalCost.toFixed(2);
    count.textContent = inventory.length + " items";

    if (inventory.length === 0) {
      body.innerHTML = `<tr><td colspan="5" class="empty-inv">No inventory items yet. Add one above!</td></tr>`;
      return;
    }

    body.innerHTML = inventory.map(item => {
      const qty    = parseInt(item.quantity) || 0;
      const isLow  = qty <= LOW_STOCK_THRESHOLD;
      return `
        <tr>
          <td>${item.name}</td>
          <td class="${isLow ? 'low-stock' : ''}">${qty}</td>
          <td>$${parseFloat(item.cost||0).toFixed(2)}</td>
          <td>${isLow ? '<span class="low-badge">⚠️ Low Stock</span>' : '<span style="color:var(--accent);font-weight:800">✓ OK</span>'}</td>
          <td><button class="del-btn" data-id="${item.id}">Remove</button></td>
        </tr>`;
    }).join("");

    body.querySelectorAll(".del-btn").forEach(btn => {
      btn.addEventListener("click", async () => {
        await deleteDoc(doc(db, "inventory", btn.dataset.id));
        showToast("Item removed");
      });
    });
  }

  document.getElementById("addItemBtn").addEventListener("click", async () => {
    const name = document.getElementById("iName").value.trim();
    const qty  = parseInt(document.getElementById("iQty").value);
    const cost = parseFloat(document.getElementById("iCost").value);
    if (!name || isNaN(qty) || isNaN(cost)) { showToast("⚠️ Fill in all fields!"); return; }
    await addDoc(collection(db, "inventory"), { name, quantity: qty, cost, createdAt: serverTimestamp() });
    document.getElementById("iName").value = "";
    document.getElementById("iQty").value  = "";
    document.getElementById("iCost").value = "";
    showToast("✅ Item added!");
  });

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2600);
  }
</script>
</body>
</html>
