<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chef Dashboard – Cooking Mama</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Pacifico&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0F0A1E;--bg2:#160D2A;--card:#1E1035;--card2:#271545;
      --border:#3A1F60;--text:#EDD9FF;--text2:#A07CC5;
      --accent:#C97FC7;--accent2:#9B5BB5;--green:#69D08A;--green2:#2D8A4E;
      --yellow:#FFD54F;--red:#FF5C8A;--red2:#C2185B;
      --orange:#FFB347;--blue:#7EC8E3;
      --shadow:rgba(160,80,220,0.22);
    }
    html,body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

    /* NAV */
    nav{position:sticky;top:0;z-index:100;background:var(--bg2);border-bottom:2px solid var(--border);
      display:flex;align-items:center;justify-content:space-between;padding:10px 24px;
      box-shadow:0 2px 20px var(--shadow);}
    .nav-logo{height:44px;object-fit:contain;cursor:pointer}
    .nav-title{font-family:'Pacifico',cursive;font-size:1.15rem;color:var(--accent)}
    .nav-right{display:flex;align-items:center;gap:12px}
    .user-pill{display:flex;align-items:center;gap:8px;background:var(--card);border:1.5px solid var(--border);
      border-radius:50px;padding:5px 14px 5px 5px;font-weight:700;font-size:0.82rem;color:var(--text2)}
    .user-pill img{width:30px;height:30px;border-radius:50%;border:2px solid var(--accent);object-fit:cover}
    .sign-out-btn{background:transparent;border:2px solid var(--border);border-radius:50px;padding:6px 14px;
      font-family:'Nunito',sans-serif;font-size:0.78rem;font-weight:700;color:var(--text2);cursor:pointer;
      transition:border-color .2s,color .2s}
    .sign-out-btn:hover{border-color:var(--red);color:var(--red)}

    /* HERO */
    .hero{text-align:center;padding:32px 16px 8px}
    .hero h1{font-family:'Pacifico',cursive;font-size:2rem;color:var(--accent);
      text-shadow:0 0 30px rgba(201,127,199,0.4)}
    .hero p{color:var(--text2);font-weight:600;margin-top:4px}

    /* STATUS FILTER TABS */
    .filter-tabs{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;padding:16px}
    .ftab{background:var(--card);border:2px solid var(--border);border-radius:50px;
      padding:7px 18px;font-family:'Nunito',sans-serif;font-size:0.83rem;font-weight:800;
      cursor:pointer;color:var(--text2);transition:all .18s}
    .ftab.active,.ftab:hover{background:var(--accent2);color:#fff;border-color:var(--accent2);
      box-shadow:0 3px 12px var(--shadow)}

    /* ORDERS GRID */
    .orders-wrap{max-width:1100px;margin:0 auto;padding:8px 16px 80px;
      display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px}
    .empty-state{grid-column:1/-1;text-align:center;color:var(--text2);
      padding:60px 20px;font-size:1.1rem;font-weight:700}

    /* ORDER CARD */
    .order-card{background:var(--card);border:2px solid var(--border);border-radius:20px;
      overflow:hidden;box-shadow:0 4px 20px var(--shadow);
      transition:transform .18s,box-shadow .18s;cursor:pointer}
    .order-card:hover{transform:translateY(-4px);box-shadow:0 10px 32px var(--shadow)}
    .order-card-header{padding:14px 16px 10px;display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
    .order-id{font-size:0.72rem;font-weight:800;color:var(--text2);letter-spacing:0.06em;text-transform:uppercase}
    .order-customer{font-size:1rem;font-weight:900;color:var(--text);margin-top:2px}
    .order-time{font-size:0.75rem;color:var(--text2);margin-top:3px}
    .status-badge{flex-shrink:0;border-radius:50px;padding:4px 12px;font-size:0.72rem;font-weight:900;
      text-transform:uppercase;letter-spacing:0.05em;border:2px solid}
    .badge-pending{background:rgba(255,213,79,0.15);color:var(--yellow);border-color:var(--yellow)}
    .badge-cooking{background:rgba(255,179,71,0.15);color:var(--orange);border-color:var(--orange)}
    .badge-ready{background:rgba(105,208,138,0.15);color:var(--green);border-color:var(--green)}
    .badge-completed{background:rgba(126,200,227,0.15);color:var(--blue);border-color:var(--blue)}
    .order-preview{padding:0 16px 14px;display:flex;flex-wrap:wrap;gap:6px}
    .item-chip{background:var(--card2);border-radius:50px;padding:3px 10px;font-size:0.75rem;font-weight:700;color:var(--accent)}
    .order-total{padding:10px 16px;border-top:1.5px solid var(--border);
      display:flex;justify-content:space-between;align-items:center}
    .order-total-label{font-size:0.8rem;color:var(--text2);font-weight:700}
    .order-total-val{font-size:1rem;font-weight:900;color:var(--accent)}

    /* ORDER MODAL */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;
      display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);padding:16px}
    .modal-overlay.open{display:flex}
    .modal{background:var(--card);border:2px solid var(--border);border-radius:24px;
      width:100%;max-width:480px;max-height:90vh;overflow-y:auto;
      box-shadow:0 16px 60px rgba(0,0,0,0.5);animation:popIn .22s ease}
    @keyframes popIn{from{transform:scale(0.92);opacity:0}to{transform:scale(1);opacity:1}}
    .modal-header{padding:20px 20px 0;display:flex;justify-content:space-between;align-items:flex-start}
    .modal-title{font-family:'Pacifico',cursive;font-size:1.2rem;color:var(--accent)}
    .modal-close{background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--text2);line-height:1}
    .modal-body{padding:16px 20px 24px;display:flex;flex-direction:column;gap:14px}
    .modal-section-title{font-size:0.78rem;font-weight:900;color:var(--text2);
      text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px}
    .modal-items{display:flex;flex-direction:column;gap:8px}
    .modal-item{display:flex;justify-content:space-between;align-items:center;
      background:var(--card2);border-radius:12px;padding:10px 14px}
    .modal-item-name{font-weight:800;font-size:0.9rem}
    .modal-item-qty{font-size:0.82rem;color:var(--text2);font-weight:700}
    .modal-item-price{font-weight:800;color:var(--accent);font-size:0.9rem}
    .modal-totals{background:var(--card2);border-radius:14px;padding:14px}
    .modal-row{display:flex;justify-content:space-between;font-size:0.88rem;font-weight:700;
      color:var(--text2);padding:3px 0}
    .modal-row.grand{color:var(--text);font-size:1rem;font-weight:900;
      border-top:1.5px dashed var(--border);padding-top:8px;margin-top:4px}

    /* STATUS CONTROLS */
    .status-controls{display:flex;flex-direction:column;gap:8px}
    .status-label{font-size:0.78rem;font-weight:900;color:var(--text2);text-transform:uppercase;letter-spacing:0.08em}
    .status-buttons{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .s-btn{background:var(--card2);border:2px solid var(--border);border-radius:12px;
      padding:10px;font-family:'Nunito',sans-serif;font-size:0.82rem;font-weight:800;
      cursor:pointer;color:var(--text2);transition:all .15s;text-align:center}
    .s-btn:hover{border-color:var(--accent);color:var(--accent)}
    .s-btn.active-status{border-color:var(--accent);background:rgba(201,127,199,0.15);color:var(--accent)}
    .s-btn.pending.active-status{border-color:var(--yellow);background:rgba(255,213,79,0.12);color:var(--yellow)}
    .s-btn.cooking.active-status{border-color:var(--orange);background:rgba(255,179,71,0.12);color:var(--orange)}
    .s-btn.ready.active-status{border-color:var(--green);background:rgba(105,208,138,0.12);color:var(--green)}
    .s-btn.completed.active-status{border-color:var(--blue);background:rgba(126,200,227,0.12);color:var(--blue)}
    .complete-btn{background:var(--green2);border:none;border-radius:14px;padding:14px;
      width:100%;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:900;
      color:#fff;cursor:pointer;box-shadow:0 3px 0 #1a5c34,0 5px 18px rgba(105,208,138,0.3);
      transition:transform .1s,box-shadow .1s;margin-top:4px}
    .complete-btn:hover{transform:translateY(-2px)}
    .complete-btn:active{transform:translateY(2px);box-shadow:0 1px 0 #1a5c34}
    .complete-btn:disabled{opacity:0.45;cursor:not-allowed;transform:none}

    /* LOADER */
    #authLoader{position:fixed;inset:0;background:var(--bg);z-index:9999;
      display:flex;align-items:center;justify-content:center}
    .spinner{width:46px;height:46px;border:5px solid var(--border);
      border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* TOAST */
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(40px);
      background:#3D1A6E;color:#fff;padding:12px 26px;border-radius:50px;
      font-size:0.9rem;font-weight:800;z-index:500;opacity:0;
      transition:opacity .3s,transform .3s;pointer-events:none;white-space:nowrap}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    @media(max-width:600px){
      .orders-wrap{grid-template-columns:1fr}
      nav{padding:8px 12px}
      .nav-title{display:none}
    }
  </style>
</head>
<body>
<div id="authLoader"><div class="spinner"></div></div>

<nav id="mainNav" style="display:none">
  <img class="nav-logo" src="/assets/logonav.jpg" alt="Cooking Mama"/>
  <span class="nav-title">Chef Dashboard 👨‍🍳</span>
  <div class="nav-right">
    <div class="user-pill">
      <img id="navAvatar" src="" alt="avatar"/>
      <span id="navName">Chef</span>
    </div>
    <button class="sign-out-btn" id="btnSignOut">Sign Out</button>
  </div>
</nav>

<div id="pageContent" style="display:none">
  <div class="hero">
    <h1>🍳 Kitchen Kiosk</h1>
    <p>Incoming orders — oldest to newest</p>
  </div>

  <div class="filter-tabs">
    <button class="ftab active" data-filter="all">All Orders</button>
    <button class="ftab" data-filter="pending">⏳ Pending</button>
    <button class="ftab" data-filter="cooking">🔥 Cooking</button>
    <button class="ftab" data-filter="ready">✅ Ready</button>
    <button class="ftab" data-filter="completed">📦 Completed</button>
  </div>

  <div class="orders-wrap" id="ordersWrap">
    <div class="empty-state">Loading orders… 🍴</div>
  </div>
</div>

<!-- Order Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="orderModal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modalTitle">Order</div>
        <div style="font-size:0.78rem;color:var(--text2);margin-top:4px" id="modalMeta"></div>
      </div>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-body">
      <div>
        <div class="modal-section-title">Items Ordered</div>
        <div class="modal-items" id="modalItems"></div>
      </div>
      <div class="modal-totals" id="modalTotals"></div>
      <div class="status-controls">
        <div class="status-label">Update Status</div>
        <div class="status-buttons">
          <button class="s-btn pending" data-status="pending">⏳ Pending</button>
          <button class="s-btn cooking" data-status="cooking">🔥 Cooking</button>
          <button class="s-btn ready"   data-status="ready">🔔 Ready</button>
          <button class="s-btn completed" data-status="completed">📦 Done</button>
        </div>
        <button class="complete-btn" id="completeBtn">✅ Mark as Completed</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, signOut, onAuthStateChanged }
                             from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, collection, onSnapshot, doc, updateDoc, orderBy, query }
                             from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey:"AIzaSyCEAcwTKoSnUkbaGvjrsy1QZ-Duj12WImk",
    authDomain:"cookingmamauwu-9902c.firebaseapp.com",
    projectId:"cookingmamauwu-9902c",
    storageBucket:"cookingmamauwu-9902c.firebasestorage.app",
    messagingSenderId:"18763902036",
    appId:"1:18763902036:web:a8703f75e5ddf1d1b791c1"
  };

  const OWNER_EMAIL   = "danielaiscool6128@gmail.com";
  const MANAGER_EMAIL = "mateusstavares2008@gmail.com";

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  let allOrders   = [];
  let currentFilter = "all";
  let activeOrderId = null;

  /* ── Auth guard ── */
  onAuthStateChanged(auth, user => {
    document.getElementById("authLoader").style.display = "none";
    if (!user) { window.location.href = "signup.html"; return; }
    if (user.email === OWNER_EMAIL)   { window.location.href = "owner.html";   return; }
    if (user.email === MANAGER_EMAIL) { window.location.href = "manager.html"; return; }
    document.getElementById("navAvatar").src = user.photoURL || "";
    document.getElementById("navName").textContent = user.displayName?.split(" ")[0] || "Chef";
    document.getElementById("mainNav").style.display = "flex";
    document.getElementById("pageContent").style.display = "block";
    listenOrders();
  });

  document.getElementById("btnSignOut").addEventListener("click", async () => {
    await signOut(auth);
    window.location.href = "signup.html";
  });

  /* ── Live order listener ── */
  function listenOrders() {
    const q = query(collection(db, "orders"), orderBy("time", "asc"));
    onSnapshot(q, snap => {
      allOrders = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderOrders();
    });
  }

  /* ── Filter tabs ── */
  document.querySelectorAll(".ftab").forEach(tab => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".ftab").forEach(t => t.classList.remove("active"));
      tab.classList.add("active");
      currentFilter = tab.dataset.filter;
      renderOrders();
    });
  });

  function renderOrders() {
    const wrap = document.getElementById("ordersWrap");
    const filtered = currentFilter === "all"
      ? allOrders
      : allOrders.filter(o => o.status === currentFilter);

    if (filtered.length === 0) {
      wrap.innerHTML = `<div class="empty-state">No orders here yet 🍽️</div>`;
      return;
    }

    wrap.innerHTML = filtered.map(order => {
      const timeStr = order.time?.toDate
        ? order.time.toDate().toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"})
        : "Just now";
      const dateStr = order.time?.toDate
        ? order.time.toDate().toLocaleDateString([], {month:"short",day:"numeric"})
        : "";
      const chips = order.items.map(i =>
        `<span class="item-chip">${i.name} ×${i.qty}</span>`).join("");
      const badge = statusBadge(order.status || "pending");
      return `
        <div class="order-card" data-id="${order.id}">
          <div class="order-card-header">
            <div>
              <div class="order-id">Order #${order.id.slice(-6).toUpperCase()}</div>
              <div class="order-customer">👤 ${order.userName || "Guest"}</div>
              <div class="order-time">${dateStr} · ${timeStr}</div>
            </div>
            ${badge}
          </div>
          <div class="order-preview">${chips}</div>
          <div class="order-total">
            <span class="order-total-label">Total (w/ tax)</span>
            <span class="order-total-val">$${(order.total||0).toFixed(2)}</span>
          </div>
        </div>`;
    }).join("");

    wrap.querySelectorAll(".order-card").forEach(card => {
      card.addEventListener("click", () => openModal(card.dataset.id));
    });
  }

  function statusBadge(status) {
    const map = {
      pending:   ["⏳ Pending",   "pending"],
      cooking:   ["🔥 Cooking",   "cooking"],
      ready:     ["🔔 Ready",     "ready"],
      completed: ["📦 Completed", "completed"],
    };
    const [label, cls] = map[status] || map.pending;
    return `<span class="status-badge badge-${cls}">${label}</span>`;
  }

  /* ── Modal ── */
  function openModal(orderId) {
    const order = allOrders.find(o => o.id === orderId);
    if (!order) return;
    activeOrderId = orderId;

    const timeStr = order.time?.toDate
      ? order.time.toDate().toLocaleString([], {month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"})
      : "Just now";

    document.getElementById("modalTitle").textContent = `Order #${orderId.slice(-6).toUpperCase()}`;
    document.getElementById("modalMeta").textContent  = `👤 ${order.userName || "Guest"}  ·  🕐 ${timeStr}`;

    document.getElementById("modalItems").innerHTML = order.items.map(i => `
      <div class="modal-item">
        <span class="modal-item-name">${i.name}</span>
        <span class="modal-item-qty">×${i.qty}</span>
        <span class="modal-item-price">$${(i.price * i.qty).toFixed(2)}</span>
      </div>`).join("");

    document.getElementById("modalTotals").innerHTML = `
      <div class="modal-row"><span>Subtotal</span><span>$${(order.subtotal||0).toFixed(2)}</span></div>
      <div class="modal-row"><span>Tax (6.625%)</span><span>$${(order.tax||0).toFixed(2)}</span></div>
      <div class="modal-row grand"><span>Total</span><span>$${(order.total||0).toFixed(2)}</span></div>`;

    // Status buttons
    const cur = order.status || "pending";
    document.querySelectorAll(".s-btn").forEach(btn => {
      btn.classList.toggle("active-status", btn.dataset.status === cur);
    });
    document.getElementById("completeBtn").disabled = cur === "completed";

    document.getElementById("modalOverlay").classList.add("open");
  }

  document.getElementById("modalClose").addEventListener("click", () =>
    document.getElementById("modalOverlay").classList.remove("open"));
  document.getElementById("modalOverlay").addEventListener("click", e => {
    if (e.target === document.getElementById("modalOverlay"))
      document.getElementById("modalOverlay").classList.remove("open");
  });

  /* ── Status update ── */
  document.querySelectorAll(".s-btn").forEach(btn => {
    btn.addEventListener("click", async () => {
      if (!activeOrderId) return;
      const status = btn.dataset.status;
      await updateDoc(doc(db, "orders", activeOrderId), { status });
      document.querySelectorAll(".s-btn").forEach(b => b.classList.remove("active-status"));
      btn.classList.add("active-status");
      document.getElementById("completeBtn").disabled = status === "completed";
      showToast(`Status → ${status} 🍴`);
    });
  });

  document.getElementById("completeBtn").addEventListener("click", async () => {
    if (!activeOrderId) return;
    await updateDoc(doc(db, "orders", activeOrderId), { status: "completed" });
    document.querySelectorAll(".s-btn").forEach(b =>
      b.classList.toggle("active-status", b.dataset.status === "completed"));
    document.getElementById("completeBtn").disabled = true;
    showToast("✅ Order marked as completed!");
  });

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2800);
  }
</script>
</body>
</html>
